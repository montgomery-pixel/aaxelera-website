<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 65" fill="none">
  <!-- Classic pyramid: base 100, height 65, ~52° slope -->
  <!-- Apex at (50,2), base corners at (5,63) and (95,63) -->
  <!-- Left face -->
  <path d="M50 2L5 63h45V2z" fill="#1a1a1a"/>
  <!-- Right face -->
  <path d="M50 2l45 61H50V2z" fill="#333333"/>
  <!-- Capstone - edges land exactly on pyramid slope lines -->
  <!-- At y=22: left = 50 - 45*(63-22)/(63-2) = 50 - 45*(41/61) = 50 - 30.25 = 19.75 -->
  <!-- At y=22: right = 50 + 30.25 = 80.25 -->
  <path d="M50 2L19.75 22h60.5L50 2z" fill="#4a4a4a"/>
  <!-- Edge lines -->
  <path d="M5 63L50 2" stroke="#555555" stroke-width="0.4"/>
  <path d="M95 63L50 2" stroke="#666666" stroke-width="0.4"/>
  <path d="M50 22v41" stroke="#2a2a2a" stroke-width="0.25"/>
  <!-- Capstone separation line -->
  <path d="M19.75 22h60.5" stroke="#555555" stroke-width="0.3"/>
</svg>
