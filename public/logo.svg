<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 65" fill="none">
  <!-- Classic pyramid proportions: base ~100, height ~65 (51-53° slope angle) -->
  <!-- Left face - darkest -->
  <path d="M50 2L5 63h45V2z" fill="#1a1a1a"/>
  <!-- Right face - medium -->
  <path d="M50 2l45 61H50V2z" fill="#333333"/>
  <!-- Top highlight facet -->
  <path d="M50 2L42 16h16L50 2z" fill="#4a4a4a"/>
  <!-- Edge highlights -->
  <path d="M5 63L50 2" stroke="#555555" stroke-width="0.4"/>
  <path d="M95 63L50 2" stroke="#666666" stroke-width="0.4"/>
  <!-- Center crease -->
  <path d="M50 2v61" stroke="#2a2a2a" stroke-width="0.25"/>
  <!-- Top shine -->
  <path d="M50 2L44 12h12L50 2z" fill="#888888" opacity="0.25"/>
</svg>
