<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 65" fill="none">
  <!-- Left face - grey -->
  <polygon points="50,2 5,63 50,63" fill="#808080"/>
  <!-- Right face - black -->
  <polygon points="50,2 95,63 50,63" fill="#1a1a1a"/>
  <!-- Capstone - light grey, covering top portion -->
  <!-- At y=22: left = 5 + 45*(20/61) = 19.75, right = 95 - 45*(20/61) = 80.25 -->
  <polygon points="50,2 19.75,22 80.25,22" fill="#b0b0b0"/>
</svg>
